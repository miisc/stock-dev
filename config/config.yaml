# 股票交易系统配置文件

# 数据源配置
data_source:
  provider: "tushare"  # 数据源提供商: tushare, akshare
  token: ""  # Tushare API token，需要在环境变量中设置
  
# 数据存储配置
database:
  type: "sqlite"
  path: "data/stock_data.db"
  
# 回测配置
backtesting:
  initial_capital: 100000  # 初始资金
  commission_rate: 0.0003  # 手续费率 0.03%
  slippage_rate: 0.001  # 滑点率 0.1%
  
# 交易配置
trading:
  max_position_ratio: 0.2  # 单笔交易最大资金比例
  max_daily_loss_ratio: 0.05  # 每日最大亏损比例
  max_daily_trades: 10  # 单日最大交易次数
  
# 日志配置
logging:
  level: "INFO"
  file: "logs/stock_system.log"
  max_size: "10MB"
  backup_count: 5
  
# API配置
api:
  broker: "simulation"  # 券商: simulation, jq, jg
  api_key: ""  # 需要在环境变量中设置
  api_secret: ""  # 需要在环境变量中设置
  
# 风控配置
risk:
  max_drawdown: 0.15  # 最大回撤限制
  position_limit: 0.8  # 总仓位上限

# 数据质量门禁配置
quality:
  report_dir: "data/quality_reports"
  gate_warning_allow: true
  missing_ratio_warning: 0.02
  missing_ratio_failed: 0.10
  duplicate_ratio_warning: 0.005
  duplicate_ratio_failed: 0.02
  date_disorder_ratio_warning: 0.005
  date_disorder_ratio_failed: 0.02
  ohlc_anomaly_ratio_warning: 0.005
  ohlc_anomaly_ratio_failed: 0.02
  non_positive_price_ratio_warning: 0.0
  non_positive_price_ratio_failed: 0.001
  min_rows_for_assessment: 2

# 一致性与性能验收配置
repeatability:
  warning:
    total_return: 0.2
    annual_return: 0.2
    max_drawdown: 0.2
    sharpe_ratio: 0.1
    win_rate: 1.0
  failed:
    total_return: 0.5
    annual_return: 0.5
    max_drawdown: 0.5
    sharpe_ratio: 0.2
    win_rate: 2.0

performance:
  download_p95_seconds: 30
  batch_download_p95_minutes: 30
  single_backtest_p95_seconds: 5
  batch_backtest_p95_minutes: 30